services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: skillshub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: skillshub
      POSTGRES_PASSWORD: skillshub_password
      POSTGRES_DB: skillshub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillshub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skillshub-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: skillshub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skillshub-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillshub-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://skillshub:skillshub_password@postgres:5432/skillshub
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      RUST_LOG: info
      CACHE_TTL: 3600
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - skillshub-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skillshub-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - skillshub-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  skillshub-network:
    driver: bridge
