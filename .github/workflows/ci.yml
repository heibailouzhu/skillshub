name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Backend tests
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: skillshub
          POSTGRES_PASSWORD: skillshub_password
          POSTGRES_DB: skillshub
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
        components: rustfmt, clippy

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: backend/target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Install dependencies
      working-directory: ./backend
      run: cargo fetch

    - name: Format check
      working-directory: ./backend
      run: cargo fmt --all -- --check

    - name: Clippy
      working-directory: ./backend
      run: cargo clippy -- -D warnings

    - name: Run unit tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://skillshub:skillshub_password@localhost:5432/skillshub
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: ci-test-jwt-secret
        SERVER_ADDRESS: 127.0.0.1:8080
        TEST_API_URL: http://localhost:8080
      run: cargo test --bin backend -- --test-threads=1

    - name: Run integration tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://skillshub:skillshub_password@localhost:5432/skillshub
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: ci-test-jwt-secret
        SERVER_ADDRESS: 127.0.0.1:8080
        TEST_API_URL: http://localhost:8080
      run: |
        set -euo pipefail

        cargo build --release

        ./target/release/backend > backend.log 2>&1 &
        BACKEND_PID=$!

        cleanup() {
          echo "==== backend.log ===="
          cat backend.log || true
          if kill -0 "$BACKEND_PID" 2>/dev/null; then
            kill "$BACKEND_PID" || true
          fi
        }
        trap cleanup EXIT

        for i in {1..30}; do
          if curl -fsS http://127.0.0.1:8080/health > /dev/null; then
            echo "Backend is ready"
            break
          fi

          if ! kill -0 "$BACKEND_PID" 2>/dev/null; then
            echo "Backend process exited before becoming ready"
            exit 1
          fi

          echo "Waiting for backend to become ready... ($i/30)"
          sleep 2
        done

        curl -fsS http://127.0.0.1:8080/health
        cargo test --test api_tests -- --test-threads=1

  # Frontend tests
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Type check
      working-directory: ./frontend
      run: npm run type-check

    - name: Lint
      working-directory: ./frontend
      run: npm run lint

    - name: Build
      working-directory: ./frontend
      run: npm run build

  # Build and push Docker images
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          skillshub/backend:latest
          skillshub/backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          skillshub/frontend:latest
          skillshub/frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
